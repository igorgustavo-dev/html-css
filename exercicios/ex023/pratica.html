<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pratica Tables</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        
        table {
            width: 500px;
            height: 500px;
            border-collapse: collapse;
        }
        td {
            border: 2px solid;
            padding: 50px;
            text-align: center;
        }
        
        img {
            width: 60px;
        }

        thead > tr > th {
            padding: 10px;
        }

        td, th {
            border: 2px solid black;
            padding: 10px
        }

        td.ano {
            font-weight: bold;
            color: green
        }
    </style>
</head>
<body>
    <h1>Times Brasileiros</h1>
    <table>
        <thead>
            <tr>
                <th scope="col">Times</th>
                <th scope="col">Estado</th>
                <th scope="col">Ano</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td> <img src="times/corinthians.png" alt=""> Corinthians</td>
                <td>São Paulo</td>
                <td class="ano">1910</td>
            </tr>
            <tr>
                <td> <img src="times/flamengo.png" alt="">CR Flamengo</td>
                <td>Rio de Janeiro</td>
                <td class="ano">1895</td>
            </tr>
            <tr>
                <td> <img src="times/cruzeiro.png" alt="">Cruzeiro EC</td>
                <td>Belo Horizonte</td>
                <td class="ano">1921</td>
            </tr>
            <tr>
                <td> <img src="times/palmeiras.png" alt="">Palmeiras</td>
                <td>São Paulo</td>
                <td class="ano">1914</td>
            </tr>
            <tr>
                <td> <img src="times/saopaulo.png" alt="">São Paulo FC</td>
                <td>São Paulo</td>
                <td class="ano">1930</td>
            </tr>
            <tr>
                <td> <img src="times/fluminense.png" alt="">Fluminense</td>
                <td>Rio de Janeiro</td>
                <td class="ano">1902</td>
            </tr>
            <tr>
                <td> <img src="times/bahia.png" alt="">EC Bahia</td>
                <td>Salvador</td>
                <td class="ano">1931</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
