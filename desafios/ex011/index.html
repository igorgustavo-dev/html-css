<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Passion+One:wght@400;700;900&display=swap">
    <title>Cordel Moderno</title>
    <style>
        * {
            margin: 0px;
            padding: 0px;
        }

        div > h1 {
            background-color: black;
            color: white;
            text-align: center;
            padding: 40px
            font-family: 'Passion One', Arial;
        }

        div> p {
            font-family: Arial, Helvetica, sans-serif;
        }

        
        a {
            text-decoration: none;
            color: white;
        }

        a:hover {
            color: rgb(202, 40, 40);
            text-decoration: underline
        }
    </style>
</head>

<body>
    <div>
        <h1>Cordel Moderno</h1>
        <p>Por <a href="https://www.recantodasletras.com.br/poesias/3186743" target="_blank"><strong>Milton
                    Duarte</strong></a></p>
    </div>
    <p>Estou ficando cansado
        Da tal tecnologia
        Só se fala por e-mail
        Mensagem curta e fria
        Twitter e Facebook
        Antes que eu caduque
        Vou dizer tudo em poesia.
    </p>
</body>

</html>
